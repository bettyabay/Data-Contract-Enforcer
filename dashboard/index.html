<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Contract Enforcer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="app">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">CE</div>
      <div class="brand-name">Contract Enforcer</div>
      <div class="brand-sub">Schema integrity platform</div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Menu</div>
      <button class="nav-item active" data-page="overview">
        <span class="nav-icon">⊞</span> Overview
      </button>
      <button class="nav-item" data-page="contracts">
        <span class="nav-icon">◻</span> Contracts
      </button>
      <button class="nav-item" data-page="reports">
        <span class="nav-icon">✓</span> Validation Reports
      </button>
      <button class="nav-item" data-page="baselines">
        <span class="nav-icon">∿</span> Baselines
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Reports</div>
      <button class="nav-item" data-page="enforcer">
        <span class="nav-icon">◈</span> Enforcer Report
        <span class="nav-badge">Ph3</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="phase-pill">
        <strong>Phase 1 Active</strong>
        Generator &amp; Runner
      </div>
    </div>
  </nav>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main class="main">
    <div id="main-content">
      <div class="loading">Loading dashboard…</div>
    </div>
  </main>

  <!-- ── Detail panel ───────────────────────────────────────────────────── -->
  <aside id="detail-panel" class="detail-panel"></aside>

</div>
<script src="/app.js"></script>
</body>
</html>
