apiVersion: v3.0.0
kind: DataContract
id: langsmith_traces
info:
  title: LangSmith Agent Traces
  version: 1.0.0
  owner: ai-team
  description: One record per LangSmith trace run. Covers latency, token usage, error
    rate, and AI-reported confidence scores.
servers:
  local:
    type: local
    path: outputs/traces/runs.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: See schema constraints for field-level limitations.
source:
  path: outputs/traces/runs.jsonl
  sha256: eb3cbc8cfc717d4d15fc57ec4e0ab7556442aacd669f444ba0ab5a762326d85d
  record_count: 60
  generated_at: '2026-04-02T14:44:02.332262Z'
schema:
  type: object
  properties:
    id:
      type: string
      required: true
    name:
      type: string
      required: true
      enum:
      - AutomatonAuditorGraph
      - judge_prosecutor
      - pdf_chunk_retriever
      - repo_clone_sandbox
      - report_chunk_embed
    run_type:
      type: string
      required: true
      enum:
      - chain
      - embedding
      - llm
      - retriever
      - tool
    error:
      type: string
      required: false
    start_time:
      type: string
      required: true
    end_time:
      type: string
      required: true
    total_tokens:
      type: integer
      required: true
      minimum: 1
      maximum: 5606.0
    prompt_tokens:
      type: integer
      required: true
      minimum: 1
      maximum: 4599.0
    completion_tokens:
      type: integer
      required: true
      minimum: 1
      maximum: 1088.0
    total_cost:
      type: number
      required: true
      minimum: 0.0153
      maximum: 0.0168
    parent_run_id:
      type: string
      required: false
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
    session_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
      enum:
      - bd9e1b3d-c841-43fb-93b6-ad39b109a974
quality:
  type: SodaChecks
  specification:
    checks for langsmith_traces:
    - row_count >= 1
    - missing_count(id) = 0
    - missing_count(name) = 0
    - missing_count(run_type) = 0
    - missing_count(start_time) = 0
    - missing_count(end_time) = 0
    - missing_count(total_tokens) = 0
    - missing_count(prompt_tokens) = 0
    - missing_count(completion_tokens) = 0
    - missing_count(total_cost) = 0
    - duplicate_count(parent_run_id) = 0
    - missing_count(session_id) = 0
    - duplicate_count(session_id) = 0
  drift_checks:
  - type: statistical_drift
    field: total_tokens
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: prompt_tokens
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: completion_tokens
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: total_cost
    z_score_warn: 2.0
    z_score_fail: 3.0
lineage:
  upstream: []
  downstream: []
