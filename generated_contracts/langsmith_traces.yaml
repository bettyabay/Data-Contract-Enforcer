apiVersion: v3.0.0
kind: DataContract
id: langsmith_traces
info:
  title: LangSmith Agent Traces
  version: 1.0.0
  owner: ai-team
  description: One record per LangSmith trace run. Covers latency, token usage, error
    rate, and AI-reported confidence scores.
servers:
  local:
    type: local
    path: outputs/traces/runs.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: See schema constraints for field-level limitations.
source:
  path: outputs/traces/runs.jsonl
  sha256: eb3cbc8cfc717d4d15fc57ec4e0ab7556442aacd669f444ba0ab5a762326d85d
  record_count: 60
  generated_at: '2026-04-04T15:26:15.108419Z'
schema:
  type: object
  properties:
    id:
      type: string
      required: true
    name:
      type: string
      required: true
      enum:
      - AutomatonAuditorGraph
      - judge_prosecutor
      - pdf_chunk_retriever
      - repo_clone_sandbox
      - report_chunk_embed
    run_type:
      type: string
      required: true
      enum:
      - chain
      - embedding
      - llm
      - retriever
      - tool
    error:
      type: string
      required: false
    start_time:
      type: string
      required: true
    end_time:
      type: string
      required: true
    total_tokens:
      type: integer
      required: true
      minimum: 1
      maximum: 5606.0
    prompt_tokens:
      type: integer
      required: true
      minimum: 1
      maximum: 4599.0
    completion_tokens:
      type: integer
      required: true
      minimum: 1
      maximum: 1088.0
    total_cost:
      type: number
      required: true
      minimum: 0.0153
      maximum: 0.0168
    parent_run_id:
      type: string
      required: false
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
    session_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
      enum:
      - bd9e1b3d-c841-43fb-93b6-ad39b109a974
quality:
  type: SodaChecks
  specification:
    checks for langsmith_traces:
    - row_count >= 1
    - missing_count(id) = 0
    - missing_count(name) = 0
    - missing_count(run_type) = 0
    - missing_count(start_time) = 0
    - missing_count(end_time) = 0
    - missing_count(total_tokens) = 0
    - missing_count(prompt_tokens) = 0
    - missing_count(completion_tokens) = 0
    - missing_count(total_cost) = 0
    - duplicate_count(parent_run_id) = 0
    - missing_count(session_id) = 0
    - duplicate_count(session_id) = 0
  drift_checks:
  - type: statistical_drift
    field: total_tokens
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: prompt_tokens
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: completion_tokens
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: total_cost
    z_score_warn: 2.0
    z_score_fail: 3.0
lineage:
  upstream: []
  downstream:
  - id: week7-enforcer
    description: 'Registered subscriber via ContractRegistry. Validation mode: AUDIT.'
    fields_consumed:
    - run_id
    - run_type
    - inputs
    - outputs
    - start_time
    - end_time
    - total_tokens
    - prompt_tokens
    - completion_tokens
    - total_cost
    breaking_if_changed:
    - outputs_confidence
    - run_id
    - total_tokens
    validation_mode: AUDIT
    contact: week7-team@org.com
llm_annotations:
  id:
    description: A unique identifier for each trace record, represented as a UUID
      string
    validation_expression: isinstance(v, str) and len(v) == 36 and v.count('-') ==
      4
    cross_column_note: Likely serves as a primary key for uniquely identifying trace
      records across other columns
  name:
    description: A descriptive name for a specific trace or operation within a system
      workflow
    validation_expression: isinstance(v, str) and len(v.strip()) > 0 and len(v) <=
      100
    cross_column_note: Often correlates with the 'run_type' to provide context about
      the specific trace or operation
  run_type:
    description: Categorizes the type of operation or component being traced in a
      LangSmith execution
    validation_expression: isinstance(v, str) and v in ['chain', 'tool', 'llm', 'retriever',
      'embedding']
    cross_column_note: Should align contextually with the 'name' column to provide
      precise tracing details
  error:
    description: A list of error details captured during the trace execution
    validation_expression: isinstance(v, list)
    cross_column_note: Likely relates to 'run_type' - errors may be specific to certain
      run types
  start_time:
    description: Timestamp indicating when the trace or operation was initiated, stored
      in ISO 8601 UTC format
    validation_expression: isinstance(v, str) and len(v) > 0 and v.endswith('Z') and
      v.count('T') == 1 and v[0:4].isdigit() and v[5:7].isdigit() and v[8:10].isdigit()
    cross_column_note: Often used in relation with 'id' to create a unique temporal
      reference for the trace
