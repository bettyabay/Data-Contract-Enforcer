apiVersion: v3.0.0
kind: DataContract
id: langsmith_traces
info:
  title: LangSmith Agent Traces
  version: 1.0.0
  owner: ai-team
  description: One record per LangSmith trace run. Covers latency, token usage, error
    rate, and AI-reported confidence scores.
servers:
  local:
    type: local
    path: outputs/traces/runs.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence must remain in 0.0-1.0 float range.
source:
  path: outputs/traces/runs.jsonl
  sha256: ff47c6812c1267263f1567af5b7fb3d5dae155f40bb85043e33714a5fb18aa00
  record_count: 60
  generated_at: '2026-04-01T10:28:50.722314Z'
schema:
  type: object
  properties:
    run_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
    trace_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
    run_type:
      type: string
      required: true
      enum:
      - chain
      - llm
      - retriever
      - tool
    name:
      type: string
      required: true
      enum:
      - attribute_violation
      - extract_facts
      - generate_contract
      - validate_schema
    inputs_prompt:
      type: string
      required: true
    inputs_context:
      type: string
      required: true
      enum:
      - '...'
    outputs_result:
      type: string
      required: true
    outputs_confidence:
      type: number
      required: true
      minimum: 0.0
      maximum: 1.0
      description: Confidence score. MUST remain 0.0-1.0 float. BREAKING if changed
        to 0-100 percentage scale.
    error:
      type: string
      required: false
      enum:
      - 'TimeoutError: LLM response exceeded 30s'
    start_time:
      type: string
      required: true
    end_time:
      type: string
      required: true
    latency_ms:
      type: integer
      required: true
      minimum: 1
      maximum: 7915.0
    total_tokens:
      type: integer
      required: true
      minimum: 1
      maximum: 5887.0
    prompt_tokens:
      type: integer
      required: true
      minimum: 1
      maximum: 3974.0
    completion_tokens:
      type: integer
      required: true
      minimum: 1
      maximum: 1966.0
    feedback_score:
      type: number
      required: false
      minimum: 0.0
      maximum: 1.0
    feedback_comment:
      type: string
      required: false
quality:
  type: SodaChecks
  specification:
    checks for langsmith_traces:
    - row_count >= 1
    - missing_count(run_id) = 0
    - duplicate_count(run_id) = 0
    - missing_count(trace_id) = 0
    - duplicate_count(trace_id) = 0
    - missing_count(run_type) = 0
    - missing_count(name) = 0
    - missing_count(inputs_prompt) = 0
    - missing_count(inputs_context) = 0
    - missing_count(outputs_result) = 0
    - missing_count(outputs_confidence) = 0
    - min(outputs_confidence) >= 0.0
    - max(outputs_confidence) <= 1.0
    - missing_count(start_time) = 0
    - missing_count(end_time) = 0
    - missing_count(latency_ms) = 0
    - missing_count(total_tokens) = 0
    - missing_count(prompt_tokens) = 0
    - missing_count(completion_tokens) = 0
  drift_checks:
  - type: statistical_drift
    field: outputs_confidence
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: latency_ms
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: total_tokens
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: prompt_tokens
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: completion_tokens
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: feedback_score
    z_score_warn: 2.0
    z_score_fail: 3.0
lineage:
  upstream: []
  downstream: []
