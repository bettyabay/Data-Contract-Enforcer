version: 2
models:
- name: langsmith_traces
  description: One record per LangSmith trace run. Covers latency, token usage, error
    rate, and AI-reported confidence scores.
  columns:
  - name: id
    tests:
    - not_null
  - name: name
    tests:
    - not_null
    - accepted_values:
        values:
        - AutomatonAuditorGraph
        - judge_prosecutor
        - pdf_chunk_retriever
        - repo_clone_sandbox
        - report_chunk_embed
  - name: run_type
    tests:
    - not_null
    - accepted_values:
        values:
        - chain
        - embedding
        - llm
        - retriever
        - tool
  - name: error
  - name: start_time
    tests:
    - not_null
  - name: end_time
    tests:
    - not_null
  - name: total_tokens
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 1
        max_value: 5606.0
  - name: prompt_tokens
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 1
        max_value: 4599.0
  - name: completion_tokens
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 1
        max_value: 1088.0
  - name: total_cost
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0.0153
        max_value: 0.0168
  - name: parent_run_id
    tests:
    - unique
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  - name: session_id
    tests:
    - not_null
    - unique
    - accepted_values:
        values:
        - bd9e1b3d-c841-43fb-93b6-ad39b109a974
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
