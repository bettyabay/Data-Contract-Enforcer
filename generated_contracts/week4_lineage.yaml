apiVersion: v3.0.0
kind: DataContract
id: week4_lineage
info:
  title: Week 4 Code Cartographer — Lineage Snapshots
  version: 1.0.0
  owner: week4-team
  description: One record per lineage snapshot. Each snapshot is a point-in-time graph
    of nodes and edges representing data dependencies.
servers:
  local:
    type: local
    path: outputs/week4/lineage_snapshots.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: See schema constraints for field-level limitations.
source:
  path: outputs/week4/lineage_snapshots.jsonl
  sha256: a49d6efcab9dd1d1af528ecb0857c1f453f4e8cd1c9c9161e7abb92f548b7902
  record_count: 5
  generated_at: '2026-04-04T15:25:27.689635Z'
schema:
  type: object
  properties:
    snapshot_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
      enum:
      - 123e4567-e89b-42d3-a456-426614174000
      - 223e4567-e89b-42d3-a456-426614174001
      - 323e4567-e89b-42d3-a456-426614174002
      - 423e4567-e89b-42d3-a456-426614174003
      - 523e4567-e89b-42d3-a456-426614174004
    codebase_root:
      type: string
      required: true
      enum:
      - C:/Users/SNFD/Desktop/Tenacious Projects/Codebase-Understanding-Agent/repo_cache/jaffle_shop
    git_commit:
      type: string
      required: true
      enum:
      - 7be2c5838dbdeca8e915d4e46db70e910753d7f6
    captured_at:
      type: string
      required: true
      format: date-time
      enum:
      - '2026-03-31T14:22:12Z'
      - '2026-03-31T14:22:13Z'
      - '2026-03-31T14:22:14Z'
      - '2026-03-31T14:22:15Z'
      - '2026-03-31T14:22:16Z'
    node_node_id:
      type: string
      required: true
    node_type:
      type: string
      required: true
      enum:
      - FILE
      - TABLE
    node_label:
      type: string
      required: true
quality:
  type: SodaChecks
  specification:
    checks for week4_lineage:
    - row_count >= 1
    - missing_count(snapshot_id) = 0
    - duplicate_count(snapshot_id) = 0
    - missing_count(codebase_root) = 0
    - missing_count(git_commit) = 0
    - missing_count(captured_at) = 0
    - 'invalid_count(captured_at) = 0  # format: date-time'
    - missing_count(node_node_id) = 0
    - duplicate_count(node_node_id) = 0
    - missing_count(node_type) = 0
    - missing_count(node_label) = 0
  drift_checks: []
lineage:
  upstream: []
  downstream:
  - id: week7-enforcer
    description: 'Registered subscriber via ContractRegistry. Validation mode: ENFORCE.'
    fields_consumed:
    - snapshot_id
    - nodes
    - edges
    - git_commit
    - captured_at
    breaking_if_changed:
    - nodes
    - edges
    - git_commit
    validation_mode: ENFORCE
    contact: week7-team@org.com
llm_annotations:
  codebase_root:
    description: The local filesystem path to the root directory of a software project's
      source code repository
    validation_expression: isinstance(v, str) and len(v) > 0 and '/' in v
    cross_column_note: Likely corresponds to a specific code snapshot referenced by
      the adjacent 'snapshot_id' and 'git_commit' columns
  git_commit:
    description: The unique hash identifier for a specific Git commit in the repository
    validation_expression: isinstance(v, str) and len(v) == 40 and all(c in '0123456789abcdef'
      for c in v)
    cross_column_note: Likely correlated with 'snapshot_id', represents the precise
      code state at a moment in time
  node_type:
    description: Indicates the type of node in a data lineage graph, such as whether
      the node represents a file or a database table
    validation_expression: isinstance(v, str) and v in ['FILE', 'TABLE']
    cross_column_note: Often relates to the specific node_node_id that describes the
      unique identifier for this node type in a lineage tracking system
  node_label:
    description: Identifies the source file or logical node representing a specific
      transformation or source in the data lineage tracking system
    validation_expression: isinstance(v, str) and len(v) > 0 and v.endswith(('.sql',
      '.yml'))
    cross_column_note: Likely correlates with 'node_node_id' and provides context
      for the specific transformation or source within the 'codebase_root' and 'git_commit'
