apiVersion: v3.0.0
kind: DataContract
id: week3_extractions
info:
  title: Week 3 Document Refinery — Extraction Records
  version: 1.0.0
  owner: week3-team
  description: One record per processed document. Each record contains all facts extracted
    from the source document and the entities referenced.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence must remain in 0.0-1.0 float range.
source:
  path: outputs/week3/extractions.jsonl
  sha256: dc7f5df79cfffea1f2f7bf668700713f8c1087b7273256dc11a01123ade1f562
  record_count: 60
  generated_at: '2026-04-01T10:28:47.033817Z'
schema:
  type: object
  properties:
    doc_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
    source_path:
      type: string
      required: true
    source_hash:
      type: string
      required: true
    extraction_model:
      type: string
      required: true
      enum:
      - claude-3-5-sonnet-20241022
      - claude-3-haiku-20240307
    processing_time_ms:
      type: integer
      required: true
      minimum: 1
      maximum: 4956.0
    token_count_input:
      type: integer
      required: true
      minimum: 1
      maximum: 7781.0
    token_count_output:
      type: integer
      required: true
      minimum: 1
      maximum: 1500.0
    extracted_at:
      type: string
      required: true
      format: date-time
    fact_fact_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
    fact_text:
      type: string
      required: true
    fact_confidence:
      type: number
      required: true
      minimum: 0.0
      maximum: 1.0
      description: Confidence score. MUST remain 0.0-1.0 float. BREAKING if changed
        to 0-100 percentage scale.
    fact_page_ref:
      type: number
      required: false
      minimum: 1.0
      maximum: 20.0
    fact_source_excerpt:
      type: string
      required: true
quality:
  type: SodaChecks
  specification:
    checks for week3_extractions:
    - row_count >= 1
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - missing_count(source_path) = 0
    - missing_count(source_hash) = 0
    - missing_count(extraction_model) = 0
    - missing_count(processing_time_ms) = 0
    - missing_count(token_count_input) = 0
    - missing_count(token_count_output) = 0
    - missing_count(extracted_at) = 0
    - 'invalid_count(extracted_at) = 0  # format: date-time'
    - missing_count(fact_fact_id) = 0
    - duplicate_count(fact_fact_id) = 0
    - missing_count(fact_text) = 0
    - missing_count(fact_confidence) = 0
    - min(fact_confidence) >= 0.0
    - max(fact_confidence) <= 1.0
    - missing_count(fact_source_excerpt) = 0
  drift_checks:
  - type: statistical_drift
    field: processing_time_ms
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: token_count_input
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: token_count_output
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: fact_confidence
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: fact_page_ref
    z_score_warn: 2.0
    z_score_fail: 3.0
lineage:
  upstream: []
  downstream:
  - id: file::src/api/routes.py
    fields_consumed:
    - doc_id
    - extracted_facts
    - entities
    breaking_if_changed:
    - fact_confidence
    - doc_id
