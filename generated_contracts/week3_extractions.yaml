apiVersion: v3.0.0
kind: DataContract
id: week3_extractions
info:
  title: Week 3 Document Refinery — Extraction Records
  version: 1.0.0
  owner: week3-team
  description: One record per processed document. Each record contains all facts extracted
    from the source document and the entities referenced.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence must remain in 0.0-1.0 float range.
source:
  path: outputs/week3/extractions.jsonl
  sha256: 58439ea297638bb8c29c9c1c7c68be5ebc4542f57cc880604cac43f2787c9c4a
  record_count: 60
  generated_at: '2026-04-02T14:43:54.653733Z'
schema:
  type: object
  properties:
    doc_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
    source_path:
      type: string
      required: true
      enum:
      - C:/Users/Hello/OneDrive/Desktop/Tenacious-Projects/layout-aware-document-intelligence-refinery/data/class_a/CBE_ANNUAL_REPORT_2023-24.pdf
      - C:/Users/Hello/OneDrive/Desktop/Tenacious-Projects/layout-aware-document-intelligence-refinery/data/class_b/2018_Audited_Financial_Statement_Report.pdf
      - C:/Users/Hello/OneDrive/Desktop/Tenacious-Projects/layout-aware-document-intelligence-refinery/data/class_b/Annual_Report_JUNE-2023.pdf
    source_hash:
      type: string
      required: true
      enum:
      - 018fec7b6054d0fca56e5751f6b4b3b51f45ab08d97abe2494a7ebb272780f4f
      - 4b51a9c5611db264bdf656e2b82f5a4df3dbb9fc120c0f031e5c7396b9bbb21e
      - c8c32b40171975a4df7ba4bb4cae73eeb6fd4d752a11e27307599279e7142764
    extraction_model:
      type: string
      required: true
      enum:
      - claude-3-5-sonnet-20241022
    processing_time_ms:
      type: integer
      required: true
      minimum: 1
      maximum: 9460.0
    token_count_input:
      type: integer
      required: true
      minimum: 1
      maximum: 11971.0
    token_count_output:
      type: integer
      required: true
      minimum: 1
      maximum: 1799.0
    extracted_at:
      type: string
      required: true
      format: date-time
      enum:
      - '2026-04-02T14:20:36Z'
    fact_fact_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
    fact_text:
      type: string
      required: true
      enum:
      - Interest income for the year ended 30 June 2024 was ETB 134,920 million.
      - Net profit for the year was ETB 34,280 million as of 30 June 2024.
      - The independent auditor's report covers the financial statements for the year
        ended 30 June 2023.
      - Total assets are reported as ETB 48,905 million at 30 June 2023.
    fact_confidence:
      type: number
      required: true
      minimum: 0.0
      maximum: 1.0
      description: Confidence score. MUST remain 0.0-1.0 float. BREAKING if changed
        to 0-100 percentage scale.
    fact_page_ref:
      type: integer
      required: true
      minimum: 1.0
      maximum: 176.0
    fact_source_excerpt:
      type: string
      required: true
      enum:
      - '...for the year ended 30 June 2023...'
      - Interest income 134,920 (FY ended 30 June 2024)
      - Net profit for the year 34,280 (30 June 2024)
      - Total assets 48,905 (30 June 2023)
quality:
  type: SodaChecks
  specification:
    checks for week3_extractions:
    - row_count >= 1
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - missing_count(source_path) = 0
    - missing_count(source_hash) = 0
    - missing_count(extraction_model) = 0
    - missing_count(processing_time_ms) = 0
    - missing_count(token_count_input) = 0
    - missing_count(token_count_output) = 0
    - missing_count(extracted_at) = 0
    - 'invalid_count(extracted_at) = 0  # format: date-time'
    - missing_count(fact_fact_id) = 0
    - duplicate_count(fact_fact_id) = 0
    - missing_count(fact_text) = 0
    - missing_count(fact_confidence) = 0
    - min(fact_confidence) >= 0.0
    - max(fact_confidence) <= 1.0
    - missing_count(fact_page_ref) = 0
    - missing_count(fact_source_excerpt) = 0
  drift_checks:
  - type: statistical_drift
    field: processing_time_ms
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: token_count_input
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: token_count_output
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: fact_confidence
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: fact_page_ref
    z_score_warn: 2.0
    z_score_fail: 3.0
lineage:
  upstream: []
  downstream: []
