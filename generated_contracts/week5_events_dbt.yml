version: 2
models:
- name: week5_events
  description: One record per system event. Events are immutable, ordered by sequence_number,
    and carry a typed payload.
  columns:
  - name: event_id
    tests:
    - not_null
    - unique
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  - name: event_type
    tests:
    - not_null
  - name: aggregate_id
    tests:
    - not_null
    - unique
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  - name: aggregate_type
    tests:
    - not_null
  - name: sequence_number
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 1.0
        max_value: 61.0
  - name: payload_status
    tests:
    - not_null
    - accepted_values:
        values:
        - ok
  - name: payload_item_count
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 1.0
        max_value: 99.0
  - name: metadata_causation_id
    tests:
    - unique
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  - name: metadata_correlation_id
    tests:
    - not_null
    - unique
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  - name: metadata_user_id
    tests:
    - not_null
    - unique
    - accepted_values:
        values:
        - user_1
        - user_2
        - user_3
        - user_4
        - user_5
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  - name: metadata_source_service
    tests:
    - not_null
    - accepted_values:
        values:
        - week1-intent-correlator
        - week2-digital-courtroom
        - week3-document-refinery
        - week4-brownfield-cartographer
  - name: schema_version
    tests:
    - not_null
    - accepted_values:
        values:
        - '1.0'
  - name: occurred_at
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: cast(occurred_at as timestamp) is not null
  - name: recorded_at
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: cast(recorded_at as timestamp) is not null
