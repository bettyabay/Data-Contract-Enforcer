apiVersion: v3.0.0
kind: DataContract
id: week1_intent_records
info:
  title: Week 1 Intent Correlator — Intent Records
  version: 1.0.0
  owner: week1-team
  description: One record per user query. Each record contains the classified intent
    and all code references found.
servers:
  local:
    type: local
    path: outputs/week1/intent_records.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence must remain in 0.0-1.0 float range.
source:
  path: outputs/week1/intent_records.jsonl
  sha256: 0c3a6858dcb702e85d58c63f0b1545835ab93c9330d7cf97b583400140c9cd05
  record_count: 18
  generated_at: '2026-04-04T15:22:55.491467Z'
schema:
  type: object
  properties:
    intent_id:
      type: string
      required: true
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      unique: true
    description:
      type: string
      required: true
    created_at:
      type: string
      required: true
      format: date-time
    ref_file:
      type: string
      required: true
    ref_line_start:
      type: integer
      required: true
      minimum: 1.0
      maximum: 294.0
    ref_line_end:
      type: integer
      required: true
      minimum: 4.0
      maximum: 340.0
    ref_symbol:
      type: string
      required: true
    ref_confidence:
      type: number
      required: true
      minimum: 0.0
      maximum: 1.0
      description: Confidence score. MUST remain 0.0-1.0 float. BREAKING if changed
        to 0-100 percentage scale.
quality:
  type: SodaChecks
  specification:
    checks for week1_intent_records:
    - row_count >= 1
    - missing_count(intent_id) = 0
    - duplicate_count(intent_id) = 0
    - missing_count(description) = 0
    - missing_count(created_at) = 0
    - 'invalid_count(created_at) = 0  # format: date-time'
    - missing_count(ref_file) = 0
    - missing_count(ref_line_start) = 0
    - missing_count(ref_line_end) = 0
    - missing_count(ref_symbol) = 0
    - missing_count(ref_confidence) = 0
    - min(ref_confidence) >= 0.0
    - max(ref_confidence) <= 1.0
  drift_checks:
  - type: statistical_drift
    field: ref_line_start
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: ref_line_end
    z_score_warn: 2.0
    z_score_fail: 3.0
  - type: statistical_drift
    field: ref_confidence
    z_score_warn: 2.0
    z_score_fail: 3.0
lineage:
  upstream: []
  downstream:
  - id: week2-courtroom
    description: 'Registered subscriber via ContractRegistry. Validation mode: ENFORCE.'
    fields_consumed:
    - intent_id
    - code_refs
    - governance_tags
    breaking_if_changed:
    - code_refs.file
    - code_refs.confidence
    - intent_id
    validation_mode: ENFORCE
    contact: week2-team@org.com
llm_annotations:
  description:
    description: A textual description providing context or explanation for an intent
      record
    validation_expression: isinstance(v, str) and 10 < len(v) < 500
    cross_column_note: Likely elaborates on the purpose or technical details referenced
      by the intent_id
  ref_file:
    description: File path or name related to the intent record's source code or documentation
    validation_expression: isinstance(v, str) and len(v) > 0 and '/' in v
    cross_column_note: Typically corresponds with ref_line_start to pinpoint exact
      code location
  ref_line_start:
    description: A numeric identifier representing the starting line number in a reference
      document or file
    validation_expression: isinstance(v, (str, int)) and str(v).isdigit() and int(v)
      > 0
    cross_column_note: Likely related to 'ref_file' as a line number within a specific
      referenced file
  ref_line_end:
    description: The line ending position in a reference file
    validation_expression: isinstance(v, (int, str)) and int(v) > 0
    cross_column_note: Typically used in conjunction with ref_line_start to define
      a specific line range in a reference file
  ref_symbol:
    description: A symbol or method reference name indicating the specific code context
      or function related to the intent record
    validation_expression: isinstance(v, str) and len(v) > 0 and v.replace('_', '').isalnum()
    cross_column_note: Often correlates with ref_file and ref_line_start to provide
      precise code location context
