version: 2
models:
- name: week4_lineage
  description: One record per lineage snapshot. Each snapshot is a point-in-time graph
    of nodes and edges representing data dependencies.
  columns:
  - name: snapshot_id
    tests:
    - not_null
    - unique
    - accepted_values:
        values:
        - 123e4567-e89b-42d3-a456-426614174000
        - 223e4567-e89b-42d3-a456-426614174001
        - 323e4567-e89b-42d3-a456-426614174002
        - 423e4567-e89b-42d3-a456-426614174003
        - 523e4567-e89b-42d3-a456-426614174004
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  - name: codebase_root
    tests:
    - not_null
    - accepted_values:
        values:
        - C:/Users/SNFD/Desktop/Tenacious Projects/Codebase-Understanding-Agent/repo_cache/jaffle_shop
  - name: git_commit
    tests:
    - not_null
    - accepted_values:
        values:
        - 7be2c5838dbdeca8e915d4e46db70e910753d7f6
  - name: captured_at
    tests:
    - not_null
    - accepted_values:
        values:
        - '2026-03-31T14:22:12Z'
        - '2026-03-31T14:22:13Z'
        - '2026-03-31T14:22:14Z'
        - '2026-03-31T14:22:15Z'
        - '2026-03-31T14:22:16Z'
    - dbt_utils.expression_is_true:
        expression: cast(captured_at as timestamp) is not null
  - name: node_node_id
    tests:
    - not_null
  - name: node_type
    tests:
    - not_null
    - accepted_values:
        values:
        - FILE
        - TABLE
  - name: node_label
    tests:
    - not_null
